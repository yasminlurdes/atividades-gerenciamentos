<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <label for="valor">Valor:</label>
    <input type="number" id="valor" name="valor">
    <button onclick="calcular()">Calcular</button>
    <div id="resultado"></div>
    <script>
        function calcular() {
            const valor = Number(document.getElementById("valor").value);
            const essencial = valor * 50 / 100;
            const lazer = valor * 30 / 100;
            const investimento = valor * 20 / 100;
            resultado.textContent = `Essencial: R$ ${essencial.toFixed(2)}, Lazer: R$ ${lazer.toFixed(2)}, Investimento: R$ ${investimento.toFixed(2)}`;
        }
    </script>
</body>

</html>
